*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

.hdr{background:#263238;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300}

.banner{background:#ECEFF1;border-bottom:1px solid #CFD8DC;padding:10px 14px}
.banner-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.banner-title{font-size:14px;font-weight:700;color:#37474F}
.banner-sub{font-size:12px;color:#607D8B;margin-top:2px}
.banner-right{text-align:right;flex-shrink:0}
.travel-pill{display:inline-block;background:#FCE4EC;color:#C2185B;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:3px}
.banner-pct{font-size:11px;color:#78909C}

.pct-fill{height:100%;background:#00796B;border-radius:3px;transition:width .4s}
.days{padding:8px 10px 72px;display:flex;flex-direction:column;gap:7px}

.card.blocked{background:#FFF3F3;border-color:#FFCDD2}
.card.light{background:#FFF5FB;border-color:#F8BBD9}

.card-day{font-size:14px;font-weight:700;color:#37474F}

.prog-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px}
.light-tag{font-size:10px;color:#C2185B}

.chevron.open{transform:rotate(180deg)}
.blk-banner{background:#FCE4EC;color:#C62828;font-size:12px;padding:7px 13px;border-top:1px solid #FFCDD2}
.task-list{border-top:1px solid #F0F0F0}

.cb.done{background:#263238;border-color:#263238}
.cb.done-custom{background:#F57F17;border-color:#F57F17}
.cb-check{color:#fff;font-size:11px;font-weight:900;line-height:1}

.task-text{font-size:13px;line-height:1.5;color:#424242;word-break:break-word}
.task-text.done{text-decoration:line-through;color:#BDBDBD}

.res{font-size:10px;color:#90A4AE}
.del-btn{font-size:11px;color:#EF5350;cursor:pointer;background:none;border:none;padding:0}

.add-btn{background:#263238;color:#fff;border:none;border-radius:9px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer}

.bottom-row{display:flex;justify-content:space-between;margin-bottom:5px}
.bottom-label{font-size:12px;font-weight:700;color:#546E7A}

.bottom-fill{height:100%;background:#00796B;border-radius:3px;transition:width .3s}

.task-text.half{color:#888}
.note-input{display:block;width:100%;margin-top:5px;border:none;border-bottom:1px dashed #E0E0E0;padding:3px 0;font-size:11px;color:#78909C;background:transparent;outline:none}

.state-btns{display:flex;gap:5px;margin-bottom:4px;margin-top:1px}

// STATE
let curW=0, done={}, blocked={}, custom={}, expanded={}, inputs={}, notes={}, noteInputs={};
let syncTimer=null;

function setSS(s,clr){
  const el=document.getElementById('syncEl');
  el.textContent=s;
  el.style.color=clr||'rgba(255,255,255,.7)';
}

async function load(){
  setSS('載入中...','rgba(255,255,255,.7)');
  try{
    const r=await fetch(BURL+'/latest',{headers:{'X-Master-Key':MKEY}});
    if(r.ok){const j=await r.json();const d=j.record||{};done=d.done||{};blocked=d.blocked||{};custom=d.custom||{};notes=d.notes||{};setSS('✓ 已同步','#69F0AE');}
    else setSS('⚠️ 載入失敗','#FF5252');
  }catch(e){setSS('⚠️ 載入失敗','#FF5252');}
}

function schedSync(){
  clearTimeout(syncTimer);
  setSS('⟳ 同步中...','rgba(255,255,255,.7)');
  syncTimer=setTimeout(async()=>{
    try{
      const r=await fetch(BURL,{method:'PUT',headers:MHDR,body:JSON.stringify({done,blocked,custom,notes})});
      setSS(r.ok?'✓ 已同步':'⚠️ 失敗',r.ok?'#69F0AE':'#FF5252');
    }catch(e){setSS('⚠️ 失敗','#FF5252');}
  },900);
}

// KEYS
const tid=(w,d,i)=>`w${w}d${d}t${i}`;
const did=(w,d)=>`w${w}d${d}`;
const cid=(w,d,i)=>`w${w}d${d}c${i}`;

function taskScore(v){return v===2?1:v===1?0.5:0;}
function wStats(wi){
  let tot=0,dn=0;
  DATA[wi].days.forEach((day,di)=>{
    day.tasks.forEach((_,ti)=>{tot++;dn+=taskScore(done[tid(wi,di,ti)]||0);});
    (custom[did(wi,di)]||[]).forEach((_,ci)=>{tot++;dn+=taskScore(done[cid(wi,di,ci)]||0);});
  });
  return{tot,dn,pct:tot?Math.round(dn/tot*100):0};
}

function render(){renderTabs();renderBanner();renderDays();renderBottom();}

function renderTabs(){
  const el=document.getElementById('tabs');
  el.innerHTML=DATA.map((wk,i)=>{
    const s=wStats(i);
    const cls=['tab'];
    if(i===curW)cls.push('active');
    if(wk.travel)cls.push('travel');
    const dot=s.pct===100?'<span class="done-dot">✓</span>':'';
    return`<button class="${cls.join(' ')}" onclick="sw(${i})">${wk.label}${dot}</button>`;
  }).join('');
  setTimeout(()=>{const a=document.querySelector('.tab.active');if(a)a.scrollIntoView({block:'nearest',inline:'center'});},50);
}

function renderBanner(){
  const wk=DATA[curW];const s=wStats(curW);
  const tp=wk.travel?`<div class="travel-pill">✈️ ${wk.travel.name} ${wk.travel.dates}</div>`:'';
  document.getElementById('banner').innerHTML=`
    <div class="banner-top">
      <div><div class="banner-title">${wk.label} · ${wk.dates}</div><div class="banner-sub">${wk.theme}</div></div>
      <div class="banner-right">${tp}<div class="banner-pct">${s.dn}/${s.tot} (${s.pct}%)</div></div>
    </div>
    <div class="pct-bar"><div class="pct-fill" style="width:${s.pct}%"></div></div>`;
  const all=DATA.reduce((a,_,wi)=>{const s=wStats(wi);return{tot:a.tot+s.tot,dn:a.dn+s.dn}},{tot:0,dn:0});
  const ap=all.tot?Math.round(all.dn/all.tot*100):0;
  document.getElementById('totEl').textContent=`總進度 ${all.dn}/${all.tot} (${ap}%)`;
}

function renderDays(){
  const el=document.getElementById('days');
  el.innerHTML=DATA[curW].days.map((day,di)=>{
    const DID=did(curW,di);
    const isBlk=!!blocked[DID];const isLt=!!day.light;
    const isOpen=expanded[DID]!==false;
    const cus=custom[DID]||[];
    const tot=day.tasks.length+cus.length;
    const dn=day.tasks.filter((_,ti)=>done[tid(curW,di,ti)]).length+cus.filter((_,ci)=>done[cid(curW,di,ci)]).length;
    const pct=tot?Math.round(dn/tot*100):0;
    const pb=pct===100?'#E8F5E9':pct>0?'#FFF9C4':'#F5F5F5';
    const pf=pct===100?'#2E7D32':pct>0?'#E65100':'#9E9E9E';
    const ltTag=isLt?'<span class="light-tag">✈️ 輕量</span>':'';

    let taskHTML='';
    if(isOpen){
      taskHTML='<div class="task-list">';
      day.tasks.forEach((task,ti)=>{
        const TID=tid(curW,di,ti);const isDn=!!done[TID];
        const tc=TC[task.type]||{bg:'#F5F5F5',fg:'#757575'};
        const resTag=task.res?`<span class="res">📂 ${task.res}</span>`:'';
        taskHTML+=`<div class="task" onclick="toggleT('${TID}','${DID}')">
          <div class="cb${isDn?' done':''}">${isDn?'<span class="cb-check">✓</span>':''}</div>
          <div class="task-body">
            <div class="task-text${isDn?' done':''}">${task.text}</div>
            <div class="task-tags"><span class="tag" style="background:${tc.bg};color:${tc.fg}">${TL[task.type]||''}</span>${resTag}</div>
          </div>
        </div>`;
      });
      cus.forEach((txt,ci)=>{
        const CID=cid(curW,di,ci);const csv=done[CID]||0;
        const cnoteKey=CID; const cnoteVal=notes[cnoteKey]||'';
        taskHTML+=`<div class="task custom-task" style="cursor:default">
          <div class="task-body">
            <div class="state-btns">
              <div class="sb${csv===0?' s-none':''}" onclick="setTaskState('${CID}',0,'${DID}')" title="未完成"></div>
              <div class="sb${csv===1?' s-half':''}" onclick="setTaskState('${CID}',1,'${DID}')" title="部分完成">◑</div>
              <div class="sb${csv===2?' s-full':''}" onclick="setTaskState('${CID}',2,'${DID}')" title="完成">✓</div>
            </div>
            <div class="task-text${csv===2?' done':csv===1?' half':''}">${txt}</div>
            <div class="task-tags"><span class="tag" style="background:#FFF9C4;color:#F9A825">自訂</span><button class="del-btn" onclick="event.stopPropagation();delC('${DID}',${ci})">✕ 刪除</button></div>
            <input class="note-input" placeholder="備註..." value="${cnoteVal.replace(/"/g,'&quot;')}" onclick="event.stopPropagation()" oninput="notes['${cnoteKey}']=this.value;schedSync()">
          </div>
        </div>`;
      });
      const inp=inputs[DID]||'';
      taskHTML+=`<div class="add-row">
        <input class="add-input" id="ai_${DID}" value="${inp}" placeholder="新增任務或補課..." oninput="inputs['${DID}']=this.value" onkeydown="if(event.key==='Enter')addC('${DID}')">
        <button class="add-btn" onclick="addC('${DID}')">+</button>
      </div></div>`;
    }

    const blkBanner=isBlk?'<div class="blk-banner">⚠️ 臨時任務日 — 記得補課</div>':'';
    return`<div class="card${isBlk?' blocked':''}${isLt?' light':''}">
      <div class="card-hdr" onclick="togExp('${DID}')">
        <div class="card-hdr-info">
          <div class="card-day">${day.d}</div>
          <div class="card-meta"><span class="prog-pill" style="background:${pb};color:${pf}">${dn}/${tot} · ${pct}%</span>${ltTag}</div>
        </div>
        <button class="blk-btn" onclick="event.stopPropagation();togBlk('${DID}')">${isBlk?'🔓':'🚫'}</button>
        <span class="chevron${isOpen?' open':''}">▼</span>
      </div>
      ${blkBanner}${taskHTML}
    </div>`;
  }).join('');
}

function renderBottom(){
  const s=wStats(curW);
  document.getElementById('botLabel').textContent=`${DATA[curW].label} 進度`;
  document.getElementById('botCount').textContent=`${s.dn}/${s.tot} · ${s.pct}%`;
  document.getElementById('botFill').style.width=s.pct+'%';
}

// ACTIONS
function sw(i){curW=i;render();window.scrollTo(0,0);}
function togExp(DID){expanded[DID]=expanded[DID]===false?true:false;renderDays();}
function togBlk(DID){blocked[DID]=!blocked[DID];schedSync();render();}
function setTaskState(key, val, DID){
  done[key]=val;
  schedSync();
  renderDays();renderBanner();renderBottom();
}
function addC(DID){
  const v=(inputs[DID]||'').trim();if(!v)return;
  if(!custom[DID])custom[DID]=[];
  custom[DID].push(v);inputs[DID]='';
  schedSync();renderDays();renderBanner();renderBottom();
}
function delC(DID,ci){
  if(!custom[DID])return;
  custom[DID].splice(ci,1);
  schedSync();renderDays();renderBanner();renderBottom();
}

function showReport(){
  const wk=DATA[curW];
  document.getElementById('rptTitle').textContent=wk.label+' '+wk.dates;
  const s=wStats(curW);
  let full=0,half=0,none=0,blocked_days=0;
  let notesList=[];
  let incomp=[];
  wk.days.forEach((day,di)=>{
    const DID=did(curW,di);
    if(blocked[DID])blocked_days++;
    day.tasks.forEach((task,ti)=>{
      const TID=tid(curW,di,ti);
      const v=done[TID]||0;
      if(v===2)full++;
      else if(v===1){half++;incomp.push({d:day.d,text:task.text,v:'◑'});}
      else{none++;incomp.push({d:day.d,text:task.text,v:'○'});}
      const n=notes[TID];
      if(n)notesList.push({d:day.d,text:task.text,note:n});
    });
    (custom[DID]||[]).forEach((txt,ci)=>{
      const CID=cid(curW,di,ci);
      const v=done[CID]||0;
      if(v===2)full++;else if(v===1)half++;else none++;
    });
  });
  let html=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
    <div style="background:#E8F5E9;border-radius:10px;padding:10px;text-align:center"><div style="font-size:22px;font-weight:700;color:#2E7D32">${full}</div><div style="font-size:11px;color:#388E3C">✓ 完成</div></div>
    <div style="background:#FFF9C4;border-radius:10px;padding:10px;text-align:center"><div style="font-size:22px;font-weight:700;color:#F57F17">${half}</div><div style="font-size:11px;color:#F57F17">◑ 部分完成</div></div>
    <div style="background:#F5F5F5;border-radius:10px;padding:10px;text-align:center"><div style="font-size:22px;font-weight:700;color:#9E9E9E">${none}</div><div style="font-size:11px;color:#9E9E9E">○ 未完成</div></div>
  </div>
  <div style="background:#E3F2FD;border-radius:10px;padding:10px;margin-bottom:14px;text-align:center">
    <div style="font-size:28px;font-weight:700;color:#0D47A1">${s.pct}%</div>
    <div style="font-size:12px;color:#1565C0">本週整體完成率</div>
    ${blocked_days>0?`<div style="font-size:11px;color:#C62828;margin-top:4px">⚠️ ${blocked_days}天有臨時任務</div>`:''}
  </div>`;

  if(incomp.length>0){
    html+=`<div style="font-size:13px;font-weight:700;margin-bottom:6px;color:#37474F">⚠️ 未完成 / 部分完成（需補課）</div>`;
    incomp.slice(0,10).forEach(i=>{
      html+=`<div style="font-size:12px;padding:5px 8px;border-left:3px solid ${i.v==='◑'?'#F57F17':'#EF5350'};margin-bottom:4px;color:#424242">${i.v} <b>${i.d}</b> — ${i.text}</div>`;
    });
    if(incomp.length>10)html+=`<div style="font-size:11px;color:#78909C">...還有${incomp.length-10}項</div>`;
    html+='<div style="height:12px"></div>';
  }

  if(notesList.length>0){
    html+=`<div style="font-size:13px;font-weight:700;margin-bottom:6px;color:#37474F">📝 本週備註記錄</div>`;
    notesList.forEach(n=>{
      html+=`<div style="font-size:12px;padding:5px 8px;background:#F5F5F5;border-radius:6px;margin-bottom:4px"><b>${n.d}</b> — ${n.text}<br><span style="color:#78909C">${n.note}</span></div>`;
    });
  }
  document.getElementById('rptBody').innerHTML=html;
  document.getElementById('reportModal').style.display='block';
}

(async()=>{await load();render();})();
</script>
</body>
</html>
